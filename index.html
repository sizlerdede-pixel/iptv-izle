<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro IPTV Player</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body { background: #0b0e14; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: #151921; padding: 20px; border-radius: 12px; width: 100%; max-width: 600px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 5px 0; border-radius: 5px; border: none; background: #232936; color: white; }
        .btn-box { margin-top: 15px; display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .btn-prime { background: #e94560; color: white; }
        .btn-test { background: #4ecca3; color: white; }
        .video-container { width: 100%; max-width: 800px; margin-top: 20px; display: none; background: #000; }
    </style>
</head>
<body>

<div class="container">
    <h2>IPTV SMART PLAYER</h2>
    <input type="text" id="url" placeholder="Sunucu URL (örn: http://dns.com:8080)">
    <input type="text" id="user" placeholder="Kullanıcı Adı">
    <input type="password" id="pass" placeholder="Şifre">
    <div class="btn-box">
        <button class="btn-prime" onclick="playIPTV()">YAYINI BAŞLAT</button>
        <button class="btn-test" onclick="playFree()">ÜCRETSİZ TEST ET</button>
    </div>
</div>

<div id="player-box" class="video-container">
    <video id="my-video" class="video-js vjs-default-skin vjs-16-9" controls preload="auto" data-setup='{}'>
        <source id="video-source" src="" type="application/x-mpegURL">
    </video>
</div>

<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/videojs-contrib-hls@5.15.0/dist/videojs-contrib-hls.min.js"></script>

<script>
    var player = videojs('my-video');

    function playIPTV() {
        const u = document.getElementById('url').value;
        const n = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(!u || !n || !p) { alert("Eksik bilgi!"); return; }
        
        // Önemli: IPTV sunucuları genelde canlı yayın için bu yolu kullanır
        const streamUrl = u + "/live/" + n + "/" + p + "/1.m3u8"; 
        loadStream(streamUrl);
    }

    function playFree() {
        // Bu link her tarayıcıda çalışan standart bir test linkidir
        const testUrl = "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8";
        loadStream(testUrl);
    }

    function loadStream(url) {
        document.getElementById('player-box').style.display = "block";
        player.src({ type: 'application/x-mpegURL', src: url });
        player.play();
    }
</script>
</body>
</html>
