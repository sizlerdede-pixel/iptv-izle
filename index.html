<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro IPTV Player & Kanal Listesi</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body { background: #0b0e14; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { background: #151921; padding: 15px; border-bottom: 1px solid #232936; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        input { padding: 8px; border-radius: 5px; border: none; background: #232936; color: white; width: 150px; }
        button { padding: 8px 15px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-prime { background: #e94560; color: white; }
        .btn-test { background: #4ecca3; color: white; }
        
        .main-content { display: flex; flex: 1; overflow: hidden; }
        
        /* Kanal Listesi Tasarımı */
        .sidebar { width: 250px; background: #151921; border-right: 1px solid #232936; overflow-y: auto; padding: 10px; }
        .sidebar h3 { font-size: 1rem; color: #00d2ff; border-bottom: 1px solid #232936; padding-bottom: 10px; }
        .channel-item { padding: 12px; margin-bottom: 5px; background: #1f242d; border-radius: 5px; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .channel-item:hover { background: #e94560; }
        
        /* Video Alanı */
        .video-area { flex: 1; background: #000; display: flex; align-items: center; justify-content: center; }
        .video-js { width: 100% !important; height: 100% !important; }
        
        @media (max-width: 768px) {
            .main-content { flex-direction: column; }
            .sidebar { width: 100%; height: 200px; }
        }
    </style>
</head>
<body>

<div class="header">
    <input type="text" id="url" placeholder="Sunucu URL">
    <input type="text" id="user" placeholder="Kullanıcı">
    <input type="password" id="pass" placeholder="Şifre">
    <button class="btn-prime" onclick="playIPTV()">GİRİŞ YAP</button>
    <button class="btn-test" onclick="loadTestChannels()">TEST LİSTESİ</button>
</div>

<div class="main-content">
    <div class="sidebar">
        <h3>KANAL LİSTESİ</h3>
        <div id="channel-list">
            <p style="font-size: 0.8rem; color: #8b949e;">Lütfen giriş yapın veya test listesini yükleyin.</p>
        </div>
    </div>
    <div class="video-area">
        <video id="my-video" class="video-js vjs-default-skin" controls preload="auto" data-setup='{}'>
            <source src="" type="application/x-mpegURL">
        </video>
    </div>
</div>

<script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
<script>
    var player = videojs('my-video');

    function loadTestChannels() {
        const testChannels = [
            { name: "Haber Kanalı (Test)", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" },
            { name: "Belgesel (Test)", url: "https://bitdash-a.akamaihd.net/content/sintel/hls/playlist.m3u8" },
            { name: "Spor Kanalları Örneği", url: "https://demo.unified-streaming.com/k8s/features/stable/video/tears-of-steel/tears-of-steel.ism/.m3u8" }
        ];
        renderList(testChannels);
    }

    function playIPTV() {
        const u = document.getElementById('url').value;
        const n = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(!u || !n || !p) { alert("Bilgileri girin!"); return; }
        
        // Bu örnekte giriş yapınca 3 tane kanal slotu açıyoruz (Normalde M3U'dan çekilir)
        const userChannels = [
            { name: "Kanal 1 (SD)", url: `${u}/live/${n}/${p}/1.m3u8` },
            { name: "Kanal 2 (HD)", url: `${u}/live/${n}/${p}/2.m3u8` },
            { name: "Kanal 3 (FHD)", url: `${u}/live/${n}/${p}/3.m3u8` }
        ];
        renderList(userChannels);
    }

    function renderList(channels) {
        const listDiv = document.getElementById('channel-list');
        listDiv.innerHTML = "";
        channels.forEach(ch => {
            const div = document.createElement('div');
            div.className = 'channel-item';
            div.innerText = ch.name;
            div.onclick = () => {
                player.src({ type: 'application/x-mpegURL', src: ch.url });
                player.play();
            };
            listDiv.appendChild(div);
        });
    }
</script>
</body>
</html>
