<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Özel IPTV Panel & Test</title>
    <style>
        body { background: #0f0c29; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 20px; backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); width: 100%; max-width: 380px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        h2 { margin-bottom: 20px; color: #00d2ff; letter-spacing: 1px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: none; background: rgba(255, 255, 255, 0.1); color: white; outline: none; box-sizing: border-box; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .btn-connect { padding: 15px; background: #e94560; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .btn-test { padding: 12px; background: #4ecca3; border: none; color: white; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 0.9rem; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        #result { margin-top: 25px; padding: 15px; background: rgba(0, 255, 204, 0.1); border-radius: 8px; display: none; word-break: break-all; }
        a { color: #00ffcc; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>IPTV PANEL</h2>
    <input type="text" id="url" placeholder="Sunucu URL (http://dns.com:8080)">
    <input type="text" id="user" placeholder="Kullanıcı Adı">
    <input type="password" id="pass" placeholder="Şifre">
    
    <div class="btn-group">
        <button class="btn-connect" onclick="generateLink()">BAĞLANTIYI OLUŞTUR</button>
        <button class="btn-test" onclick="loadFreeTest()">ÜCRETSİZ TEST KANALLARI YÜKLE</button>
    </div>
    
    <div id="result">
        <strong id="res-title">Bağlantı Hazır:</strong><br><br>
        <a id="m3u-link" href="#" target="_blank">Listeyi Aç / İndir</a>
    </div>
</div>

<script>
    function generateLink() {
        const url = document.getElementById('url').value;
        const user = document.getElementById('user').value;
        const pass = document.getElementById('pass').value;
        if(!url || !user || !pass) { alert("Lütfen bilgileri girin!"); return; }
        const finalUrl = `${url}/get.php?username=${user}&password=${pass}&type=m3u_plus&output=ts`;
        showResult(finalUrl, "Özel Abonelik Linkiniz:");
    }

    function loadFreeTest() {
        // Dünyadan yasal ve açık kaynaklı örnek bir m3u listesi
        const freeUrl = "https://iptv-org.github.io/iptv/index.m3u";
        showResult(freeUrl, "Ücretsiz Dünya Kanalları Yüklendi:");
    }

    function showResult(link, title) {
        document.getElementById('res-title').innerText = title;
        const linkElement = document.getElementById('m3u-link');
        linkElement.href = link;
        linkElement.innerText = "Yayınları Başlat (VLC veya Player ile)";
        document.getElementById('result').style.display = "block";
    }
</script>

</body>
</html>
